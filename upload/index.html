<html lang="en">

<meta charset="UTF-8">

<title>MindFlow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #050508;
    --grid: rgba(255,255,255,0.03);
    --accent: #00ffe0;
    --accent2: #ff3cac;
    --accent3: #f5c400;
    --node-bg: rgba(10,10,20,0.92);
    --text: #e8e8f0;
    --muted: rgba(232,232,240,0.45);
  }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Space Mono',monospace; color:var(--text); touch-action:none; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }
  body::after { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 50% at 30% 40%,rgba(0,255,224,0.06) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 75% 65%,rgba(255,60,172,0.05) 0%,transparent 70%); pointer-events:none; z-index:0; }

  canvas { position:fixed; inset:0; z-index:1; pointer-events:none; }

  .node {
    position:fixed; z-index:10;
    min-width:110px; max-width:200px;
    padding:11px 13px;
    background:var(--node-bg);
    border:1px solid rgba(0,255,224,0.25);
    border-radius:12px;
    backdrop-filter:blur(16px);
    touch-action:none;
    animation:nodeIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .node.root { border-color:rgba(245,196,0,0.5); box-shadow:0 0 20px rgba(245,196,0,0.25); }
  .node.leaf { border-color:rgba(255,60,172,0.3); }
  .node.open { border-color:var(--accent); box-shadow:0 0 16px rgba(0,255,224,0.3); }
  @keyframes nodeIn { from{opacity:0;transform:scale(0.6)} to{opacity:1;transform:scale(1)} }

  .node-label { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; line-height:1.3; }
  .node.root .node-label { color:var(--accent3); font-size:15px; }
  .node.leaf .node-label { color:rgba(255,100,190,0.95); }

  .node-summary { font-size:10px; color:var(--muted); margin-top:5px; line-height:1.5; display:none; }
  .node.open .node-summary { display:block; }

  .node-tag { display:inline-block; font-size:9px; padding:1px 7px; border-radius:20px; margin-top:5px; background:rgba(0,255,224,0.08); color:var(--accent); border:1px solid rgba(0,255,224,0.18); }
  .node.root .node-tag { background:rgba(245,196,0,0.1); color:var(--accent3); border-color:rgba(245,196,0,0.2); }
  .node.leaf .node-tag { background:rgba(255,60,172,0.08); color:var(--accent2); border-color:rgba(255,60,172,0.2); }

  .node-actions { display:none; gap:5px; margin-top:8px; }
  .node.open .node-actions { display:flex; }
  .btn { flex:1; padding:5px 0; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--muted); border-radius:6px; font-size:10px; font-family:'Space Mono',monospace; cursor:pointer; transition:all 0.15s; }
  .btn:active { background:rgba(0,255,224,0.12); color:var(--accent); border-color:rgba(0,255,224,0.3); }
  .btn.del:active { background:rgba(255,60,172,0.12); color:var(--accent2); border-color:rgba(255,60,172,0.3); }

  #topbar { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; gap:8px; padding:10px 14px; background:rgba(5,5,8,0.9); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.06); }
  .logo { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:var(--accent); white-space:nowrap; }
  .logo span { color:var(--accent2); }
  #topic-select { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:8px 10px; color:var(--text); font-family:'Space Mono',monospace; font-size:12px; outline:none; appearance:none; cursor:pointer; }
  #topic-select option { background:#0d0d14; }
  #gen-btn { padding:8px 14px; background:var(--accent); color:#000; border:none; border-radius:8px; font-family:'Syne',sans-serif; font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap; }
  #gen-btn:active { transform:scale(0.96); }

  #cats { position:fixed; top:56px; left:0; right:0; z-index:99; display:flex; gap:6px; padding:7px 12px; overflow-x:auto; scrollbar-width:none; background:rgba(5,5,8,0.7); backdrop-filter:blur(10px); border-bottom:1px solid rgba(255,255,255,0.04); }
  #cats::-webkit-scrollbar { display:none; }
  .pill { padding:3px 11px; border-radius:20px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--muted); font-size:11px; font-family:'Space Mono',monospace; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all 0.15s; }
  .pill.active { background:rgba(0,255,224,0.12); color:var(--accent); border-color:rgba(0,255,224,0.4); }

  #empty { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; text-align:center; pointer-events:none; }
  #empty h2 { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:rgba(0,255,224,0.18); margin-bottom:8px; }
  #empty p { font-size:11px; color:rgba(232,232,240,0.15); }

  #hint { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:100; font-size:10px; color:var(--muted); background:rgba(5,5,8,0.75); backdrop-filter:blur(10px); padding:5px 14px; border-radius:20px; border:1px solid rgba(255,255,255,0.06); white-space:nowrap; pointer-events:none; }
</style>

    { label:"الرياضة والحركة", tag:"لياقة", summary:"التمرين المنتظم يحسن الصحة الجسدية والنفسية.", children:[
      { label:"الكارديو", tag:"قلب", summary:"الجري والسباحة — تقوي القلب والرئتين." },
      { label:"تمارين القوة", tag:"عضلات", summary:"الأوزان والمقاومة تبني الكتلة العضلية." },
      { label:"المرونة والإطالة", tag:"مرونة", summary:"الإطالة تحافظ على صحة المفاصل وتمنع الإصابات." },
      { label:"الراحة والنوم", tag:"نوم", summary:"العضلات تنمو وتتعافى أثناء النوم." }
    ]},
    { label:"الصحة النفسية", tag:"عقل", summary:"الصحة العاطفية والنفسية والروحية.", children:[
      { label:"إدارة الضغط", tag:"تكيف", summary:"التنفس والذكر والراحة تقلل هرمون الكورتيزول." },
      { label:"نوم صحي", tag:"نوم", summary:"7-9 ساعات ليلياً تحسن الذاكرة والمزاج." },
      { label:"العلاقات الاجتماعية", tag:"مجتمع", summary:"الروابط القوية تحمي الصحة النفسية." },
      { label:"اليقظة الذهنية", tag:"وعي", summary:"التركيز على اللحظة يقلل القلق ويرفع التركيز." }
    ]}
  ]}
};

// ══════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, nodes = [], edges = [], offset = {x:0,y:0}, scale = 1, nid = 0;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// Pills & select
const cats = document.getElementById('cats');
const sel = document.getElementById('topic-select');
Object.keys(KB).forEach((k, i) => {
  const p = document.createElement('div');
  p.className = 'pill' + (i===0?' active':'');
  p.textContent = k;
  p.onclick = () => { document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active')); p.classList.add('active'); sel.value = k; };
  cats.appendChild(p);
  const o = document.createElement('option');
  o.value = k; o.textContent = k;
  sel.appendChild(o);
});
sel.onchange = () => {
  const v = sel.value;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.textContent===v));
};

// ══════════════════════════════════════════
// NODE
// ══════════════════════════════════════════
class N {
  constructor(data, x, y, depth=0, parentId=null) {
    this.id = nid++; this.data = data; this.x = x; this.y = y;
    this.depth = depth; this.parentId = parentId;
    this.open = false; this.spawned = false; this.el = null;
    this.build();
  }
  build() {
    const el = document.createElement('div');
    const isRoot = this.depth===0;
    const isLeaf = !this.data.children?.length;
    el.className = 'node'+(isRoot?' root':'')+(isLeaf?' leaf':'');
    el.dataset.id = this.id;
    el.style.animationDelay = (this.depth*0.06)+'s';
    el.innerHTML = `<div class="node-label">${this.data.label}</div>
      ${this.data.summary?`<div class="node-summary">${this.data.summary}</div>`:''}
      <span class="node-tag">${this.data.tag}</span>
      <div class="node-actions">
        ${!isLeaf?`<button class="btn xbtn">⊕ expand</button>`:''}
        <button class="btn del">✕</button>
      </div>`;
    document.body.appendChild(el);
    this.el = el; this.place(); this.bind();
  }
  place() {
    const w = this.el.offsetWidth||160, h = this.el.offsetHeight||80;
    this.el.style.left = (this.x*scale+offset.x-w/2)+'px';
    this.el.style.top  = (this.y*scale+offset.y-h/2)+'px';
  }
  bind() {
    let sx,sy,moved,lt;
    this.el.addEventListener('touchstart',e=>{
      if(e.touches.length>1)return;
      const t=e.touches[0]; sx=t.clientX; sy=t.clientY; moved=false;
      lt=setTimeout(()=>{ if(!moved) this.toggle(); },500);
    },{passive:true});
    this.el.addEventListener('touchmove',e=>{
      if(e.touches.length>1)return;
      const t=e.touches[0],dx=t.clientX-sx,dy=t.clientY-sy;
      if(Math.abs(dx)>5||Math.abs(dy)>5){ moved=true; clearTimeout(lt); this.x+=dx/scale; this.y+=dy/scale; sx=t.clientX; sy=t.clientY; this.place(); drawEdges(); }
      e.stopPropagation();
    },{passive:true});
    this.el.addEventListener('touchend',e=>{
      clearTimeout(lt);
      if(e.target.tagName==='BUTTON') return;
      if(!moved) this.toggle();
      e.stopPropagation();
    },{passive:true});
    const xb = this.el.querySelector('.xbtn');
    if(xb) {
      xb.addEventListener('touchstart',e=>{ e.stopPropagation(); e.preventDefault(); this.spawn(); },{passive:false});
      xb.addEventListener('click',e=>e.stopPropagation());
    }
    const db = this.el.querySelector('.del');
    db.addEventListener('touchstart',e=>{ e.stopPropagation(); e.preventDefault(); this.destroy(); },{passive:false});
    db.addEventListener('click',e=>e.stopPropagation());
  }
  toggle() {
    this.open=!this.open;
    this.el.classList.toggle('open',this.open);
  }
  spawn() {
    if(!this.data.children) return;
    if(this.spawned) {
      edges.filter(e=>e.from===this.id).map(e=>e.to).forEach(id=>{ const n=nodes.find(n=>n.id===id); if(n) n.destroy(); });
      this.spawned=false;
      const b=this.el.querySelector('.xbtn'); if(b) b.textContent='⊕ expand';
      return;
    }
    const count=this.data.children.length;
    this.data.children.forEach((c,i)=>{
      const a=(i/count)*Math.PI*2-Math.PI/2, d=185+Math.random()*50;
      const ch=new N(c, this.x+Math.cos(a)*d, this.y+Math.sin(a)*d, this.depth+1, this.id);
      nodes.push(ch); edges.push({from:this.id,to:ch.id});
    });
    this.spawned=true;
    const b=this.el.querySelector('.xbtn'); if(b) b.textContent='↺ reset';
    drawEdges();
    document.getElementById('empty').style.display='none';
  }
  destroy() {
    edges.filter(e=>e.from===this.id).map(e=>e.to).forEach(id=>{ const n=nodes.find(n=>n.id===id); if(n) n.destroy(); });
    edges=edges.filter(e=>e.from!==this.id&&e.to!==this.id);
    nodes=nodes.filter(n=>n.id!==this.id);
    this.el.remove(); drawEdges();
  }
}

// ══════════════════════════════════════════
// EDGES
// ══════════════════════════════════════════
function gc(node) { const r=node.el.getBoundingClientRect(); return {x:r.left+r.width/2,y:r.top+r.height/2}; }
function drawEdges() {
  ctx.clearRect(0,0,W,H);
  edges.forEach(e=>{
    const f=nodes.find(n=>n.id===e.from), t=nodes.find(n=>n.id===e.to);
    if(!f||!t) return;
    const a=gc(f),b=gc(t),mx=(a.x+b.x)/2,my=(a.y+b.y)/2-25;
    const g=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    g.addColorStop(0,'rgba(0,255,224,0.5)'); g.addColorStop(1,'rgba(255,60,172,0.35)');
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx,my,b.x,b.y);
    ctx.strokeStyle=g; ctx.lineWidth=1.5; ctx.setLineDash([5,6]); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fillStyle='rgba(255,60,172,0.7)'; ctx.fill();
  });
}

// ══════════════════════════════════════════
// GENERATE
// ══════════════════════════════════════════
document.getElementById('gen-btn').onclick = generate;
function generate() {
  const k=sel.value; if(!k||!KB[k]) return;
  nodes.forEach(n=>n.el.remove()); nodes=[]; edges=[]; drawEdges();
  document.getElementById('empty').style.display='none';
  const cx=(W/2-offset.x)/scale, cy=(H/2-offset.y)/scale;
  const root=new N(KB[k],cx,cy,0,null); nodes.push(root);
  setTimeout(()=>root.spawn(),120);
}

// ══════════════════════════════════════════
// 2-FINGER PAN & PINCH
// ══════════════════════════════════════════
let px,py,panning=false,pd0,ps0;
document.body.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    panning=true; px=(e.touches[0].clientX+e.touches[1].clientX)/2; py=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    pd0=Math.sqrt(dx*dx+dy*dy); ps0=scale;
  }
},{passive:true});
document.body.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&panning){
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    offset.x+=cx-px; offset.y+=cy-py; px=cx; py=cy;
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    scale=Math.min(2.5,Math.max(0.3,ps0*(Math.sqrt(dx*dx+dy*dy)/pd0)));
    nodes.forEach(n=>n.place()); drawEdges();
  }
},{passive:true});
document.body.addEventListener('touchend',e=>{ if(e.touches.length<2) panning=false; },{passive:true});

// ══════════════════════════════════════════
// LOOP
// ══════════════════════════════════════════
(function loop(){ drawEdges(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
